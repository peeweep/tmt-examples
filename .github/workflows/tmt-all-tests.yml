name: TMT Tests

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  discover-plans:
    name: Discover tmt plans
    runs-on: ubuntu-latest
    outputs:
      plans: ${{ steps.set-plans.outputs.plans }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install tmt
        run: pip install tmt

      - name: Discover plans
        id: set-plans
        run: |
          # Use find to locate tmt tree roots (.fmf/version) in packages
          TMT_ROOTS=$(find . -type f -name "version" -path "*/.fmf/version" | sed 's|/\.fmf/version||')
          PLANS_ARRAY=()
          
          for root in $TMT_ROOTS; do
            # For each localized tmt root, find the plan definition files
            if [ -d "$root/plans" ]; then
              fmf_files=$(find "$root/plans" -type f -name "*.fmf")
              for file in $fmf_files; do
                # Generate a valid plan filter name relative to the tmt root
                # e.g., root="./pkg" file="./pkg/plans/tier1.fmf" -> "/plans/tier1"
                rel_path="${file#$root}"
                if [[ "$rel_path" != /* ]]; then rel_path="/$rel_path"; fi
                plan_name="${rel_path%.fmf}"

                # Push an object with the root directory and the resolved plan name
                PLANS_ARRAY+=("{\"root\": \"$root\", \"name\": \"$plan_name\"}")
              done
            fi
          done

          if [ ${#PLANS_ARRAY[@]} -eq 0 ]; then
            echo "No plans found."
            echo "plans=[]" >> $GITHUB_OUTPUT
          else
            JSON_PLANS=$(printf "%s\n" "${PLANS_ARRAY[@]}" | jq -s -c '.')
            echo "Found plans: $JSON_PLANS"
            echo "plans=$JSON_PLANS" >> $GITHUB_OUTPUT
          fi

  run-tests:
    name: Test plan ${{ matrix.plan.name }}
    needs: discover-plans
    if: ${{ needs.discover-plans.outputs.plans != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        plan: ${{ fromJson(needs.discover-plans.outputs.plans) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install tmt and plugins
        run: |
          # Install tmt and common provision plugins 
          pip install tmt "tmt[provision-container]"

      - name: Run tmt tests
        id: tmt-run
        run: |
          # Change tracking context to the local tmt package working directory
          cd "${{ matrix.plan.root }}"

          # Run the specific plan, saving the output to ./tmt-run-data
          tmt run -i ./tmt-run-data -a -vv plan --name "^${{ matrix.plan.name }}$"

      - name: Sanitize plan name for artifact
        if: always()
        id: sanitize
        run: |
          # Artifact names cannot contain certain characters like '/'
          # Incorporate the root directory into the name if multiple packages have identical plan names
          RAW_NAME="${{ matrix.plan.root }}-${{ matrix.plan.name }}"
          SAFE_NAME=$(echo "$RAW_NAME" | tr -c 'a-zA-Z0-9' '-')
          echo "safe_name=$SAFE_NAME" >> $GITHUB_OUTPUT

      - name: Upload test logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tmt-results-${{ steps.sanitize.outputs.safe_name }}
          path: ${{ matrix.plan.root }}/tmt-run-data/
