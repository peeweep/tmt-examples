name: TMT Tests

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  discover-plans:
    name: Discover tmt plans
    runs-on: ubuntu-latest
    outputs:
      plans: ${{ steps.set-plans.outputs.plans }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install tmt
        run: pip install tmt

      - name: Discover plans
        id: set-plans
        run: |
          # Use tmt plan ls to get all plans, awk to print only the plan name,
          # and jq to convert the multiline string into a JSON array.
          PLANS=$(tmt plan ls | awk '{print $1}')
          
          if [ -z "$PLANS" ]; then
            echo "No plans found."
            echo "plans=[]" >> $GITHUB_OUTPUT
          else
            JSON_PLANS=$(echo "$PLANS" | jq -R -s -c 'split("\n") | map(select(length > 0))')
            echo "Found plans: $JSON_PLANS"
            echo "plans=$JSON_PLANS" >> $GITHUB_OUTPUT
          fi

  run-tests:
    name: Test plan ${{ matrix.plan }}
    needs: discover-plans
    if: ${{ needs.discover-plans.outputs.plans != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        plan: ${{ fromJson(needs.discover-plans.outputs.plans) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install tmt and plugins
        run: |
          # Install tmt and common provision plugins 
          pip install tmt "tmt[provision-container]"

      - name: Run tmt tests
        id: tmt-run
        run: |
          # Run the specific plan, saving the output to ./tmt-run-data
          tmt run -i ./tmt-run-data -a -vv plan --name "^${{ matrix.plan }}$"

      - name: Sanitize plan name for artifact
        if: always()
        id: sanitize
        run: |
          # Artifact names cannot contain certain characters like '/'
          SAFE_NAME=$(echo "${{ matrix.plan }}" | tr -c 'a-zA-Z0-9' '-')
          echo "safe_name=$SAFE_NAME" >> $GITHUB_OUTPUT

      - name: Upload test logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tmt-results-${{ steps.sanitize.outputs.safe_name }}
          path: ./tmt-run-data/
