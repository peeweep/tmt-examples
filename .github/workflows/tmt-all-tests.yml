name: TMT All Tests

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  discover-plans:
    name: Discover tmt plans
    runs-on: ubuntu-latest
    outputs:
      plans: ${{ steps.set-plans.outputs.plans }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install tmt
        run: pip install tmt

      - name: Discover plans
        id: set-plans
        run: |
          # Use find to locate tmt tree roots (.fmf/version) in packages
          TMT_ROOTS=$(find . -type f -name "version" -path "*/.fmf/version" | sed 's|/\.fmf/version||')
          PLANS_ARRAY=()
          
          for root in $TMT_ROOTS; do
            if [ -d "$root/plans" ]; then
              fmf_files=$(find "$root/plans" -type f -name "*.fmf")
              for file in $fmf_files; do
                rel_path="${file#$root}"
                if [[ "$rel_path" != /* ]]; then rel_path="/$rel_path"; fi
                plan_name="${rel_path%.fmf}"
                # Dynamically construct path as "package_name/plans/xxx.fmf" ignoring parent directories like SPECS/
                fmf_path="$(basename "$root")${rel_path}"
                PLANS_ARRAY+=("{\"root\": \"$root\", \"name\": \"$plan_name\", \"fmf_path\": \"$fmf_path\"}")
              done
            fi
          done

          if [ ${#PLANS_ARRAY[@]} -eq 0 ]; then
            echo "No plans found."
            echo "plans=[]" >> $GITHUB_OUTPUT
          else
            JSON_PLANS=$(printf "%s\n" "${PLANS_ARRAY[@]}" | jq -s -c '.')
            echo "Found plans: $JSON_PLANS"
            echo "plans=$JSON_PLANS" >> $GITHUB_OUTPUT
          fi

  run-tests:
    name: ${{ matrix.plan.fmf_path }}
    needs: discover-plans
    if: ${{ needs.discover-plans.outputs.plans != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        plan: ${{ fromJson(needs.discover-plans.outputs.plans) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Install tmt and plugins
        run: |
          # Install tmt and common provision plugins 
          pip install tmt "tmt[provision-container]"

      - name: Run tmt tests
        id: tmt-run
        run: |
          # Change tracking context to the local tmt package working directory
          cd "${{ matrix.plan.root }}"

          # Run the specific plan, saving the output using a run id
          tmt run --id tmt-run-data -a -vv plan --name "^${{ matrix.plan.name }}$"

      - name: Report tmt tests
        if: always()
        run: |
          cd "${{ matrix.plan.root }}"
          tmt run --id tmt-run-data report -vvv

      - name: Sanitize plan name for artifact
        if: always()
        id: sanitize
        run: |
          RAW_NAME="${{ matrix.plan.fmf_path }}"
          SAFE_NAME="${RAW_NAME//\//-}"
          echo "safe_name=$SAFE_NAME" >> $GITHUB_OUTPUT

      - name: Upload test logs
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: tmt-results-${{ steps.sanitize.outputs.safe_name }}
          path: /var/tmp/tmt/tmt-run-data/
